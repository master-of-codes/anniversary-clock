<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Our Love Journey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --bg-dark: #1a1a2e;
            --bg-mid: #16213e;
            --bg-light: #0f3460;
            --accent: #ff6b8b;
            --accent-glow: rgba(255, 107, 139, 0.7);
            --text-main: #ffffff;
            --text-muted: #f1f1f1;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #2b1b3a, #120c1f);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Background canvas with floating love icons */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
        }
        #confetti-canvas { 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Common Header & Carousel */
        .hero-section {
            position: relative;
            width: 100%;
            z-index: 15;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            padding: 12px 0 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 0;
        }

        .header {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .arc-svg {
            width: 240px;
            height: 60px;
            overflow: visible;
        }

        .arc-text {
            font-family: 'Dancing Script', cursive;
            font-size: 26px;
            fill: var(--text-main);
            text-shadow: 0 0 10px var(--accent-glow);
            letter-spacing: 1px;
        }

        .love-icon {
            font-size: 28px;
            animation: heartBeat 1.5s infinite;
            filter: drop-shadow(0 0 12px var(--accent));
            margin-top: -8px;
            cursor: pointer;
            transition: transform 0.1s ease;
            display: inline-block;
        }
        .love-icon:active {
            transform: scale(0.95);
        }

        @keyframes heartBeat {
            0%, 40%, 100% { transform: scale(1); }
            20%, 60% { transform: scale(1.2); }
        }

        .couple-name {
            font-family: 'Dancing Script', cursive;
            font-size: 28px;
            margin-top: 2px;
            background: -webkit-linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 107, 139, 0.4);
        }
        
        .since-date {
            font-size: 12px;
            letter-spacing: 1.5px;
            font-weight: 300;
            background: var(--glass-bg);
            backdrop-filter: blur(4px);
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 6px;
            display: inline-block;
            border: 0.5px solid var(--glass-border);
        }

        /* 3D Carousel - Fixed aspect ratio for images */
        .scene {
            width: 100%;
            height: 160px;
            perspective: 800px;
            position: relative;
            margin: 8px 0 5px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .carousel {
            width: 80px;
            height: 160px;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.1s linear;
            pointer-events: auto;
            will-change: transform;
            border-radius: 10px;
        }

        .carousel__cell {
            position: absolute;
            width: 80px;
            height: 160px;
            left: 0;
            top: 0;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 12px rgba(255,107,139,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            user-select: none;
            -webkit-user-drag: none;
            background: #2a1e3a;
        }

        .carousel__cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
            content-visibility: auto;
            contain-intrinsic-size: 140px 220px;
        }

        /* SWIPEABLE PANELS CONTAINER - Horizontal swipe layout */
        .panels-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            flex: 1;
            min-height: 0;
        }

        .panels-wrapper {
            display: flex;
            width: 200%;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform: translateX(0%);
        }

        .panels-wrapper.anniversary-active {
            transform: translateX(-50%);
        }

        .panel-slide {
            width: 50%;
            flex-shrink: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 85px;
        }

        /* Custom scroll for panels */
        .panel-slide::-webkit-scrollbar {
            width: 4px;
        }
        .panel-slide::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .panel-slide::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        /* Counters Grid */
        .counters-container {
            width: 92%;
            max-width: 900px;
            margin: 10px auto;
            position: relative;
        }

        .counters-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .counter-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 10px 8px;
            text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .counter-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 22px var(--accent-glow);
        }

        .counter-num {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-glow);
            transition: font-size 0.2s ease;
            white-space: nowrap;
        }

        .counter-label {
            font-size: 8px;
            letter-spacing: 1.5px;
            margin-top: 4px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
        }

        .anniversary-header {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            letter-spacing: 4px;
            font-size: 22px;
            text-align: center;
            margin-top: 15px;
            margin-bottom: 15px;
            background: -webkit-linear-gradient(45deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glass Button - Fixed at bottom */
        .glass-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 24px;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            outline: none;
            z-index: 200;
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            width: auto;
            pointer-events: auto;
        }
        
        .glass-btn:hover, .glass-btn:active {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 22px var(--accent-glow);
            transform: translateX(-50%) translateY(-2px);
        }

        /* responsive */
        @media (min-width: 480px) {
            .arc-svg { width: 280px; height: 80px; }
            .arc-text { font-size: 32px; }
            .couple-name { font-size: 34px; }
            .carousel, .carousel__cell { width: 100px; height: 180px; }
            .counters-grid { gap: 15px; }
            .counter-num { font-size: 26px; }
            .counter-label { font-size: 9px; }
            .since-date { font-size: 13px; }
        }

        @media (min-width: 768px) {
            .counters-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
            .carousel, .carousel__cell { width: 120px; height: 200px; }
            .counter-num { font-size: 32px; }
            .anniversary-header { font-size: 30px; }
            .scene { height: 200px; }
        }

        @media (min-width: 1024px) {
            .counters-grid { grid-template-columns: repeat(6, 1fr); }
            .carousel, .carousel__cell { width: 140px; height: 220px; }
            .arc-svg { width: 380px; }
            .arc-text { font-size: 38px; }
            .scene { height: 28vh; max-height: 280px; }
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.show { opacity: 1; pointer-events: all; }

        .modal-content {
            background: linear-gradient(145deg, rgba(30,20,40,0.98), rgba(20,15,35,0.98));
            border: 1px solid var(--accent);
            border-radius: 32px;
            padding: 32px 36px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(255,77,133,0.3);
        }

        .modal-overlay.show .modal-content { transform: scale(1); }

        .modal-title {
            font-family: 'Dancing Script', cursive;
            font-size: 48px;
            color: var(--text-main);
            margin-bottom: 16px;
            text-shadow: 0 0 12px var(--accent);
        }

        .modal-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 16px;
        }
        .modal-btn:hover { background: #ff517b; transform: scale(1.02); }

        body {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <canvas id="confetti-canvas"></canvas>

    <!-- Fixed common top: header + carousel -->
    <div class="hero-section">
        <div class="header">
            <svg class="arc-svg" viewBox="0 0 300 100">
                <path id="curve" d="M 20 80 Q 150 10 280 80" fill="transparent"/>
                <text class="arc-text"><textPath href="#curve" startOffset="50%" text-anchor="middle" id="years-text">Years Of Journey</textPath></text>
            </svg>
            <div class="love-icon" id="doubleTapHeart">❤️</div>
            <div class="couple-name">You & Me</div>
            <div class="since-date" id="since-display">Since loading...</div>
        </div>
        <div class="scene">
            <div class="carousel" id="carousel"></div>
        </div>
    </div>

    <!-- SWIPEABLE PANELS: Horizontal sliding container -->
    <div class="panels-container">
        <div class="panels-wrapper" id="panelsWrapper">
            <!-- Journey Panel (Slide 1) -->
                <div class="panel-slide">
                    <h2 class="anniversary-header">✨ OUR JOURNEY ✨</h2>
                    <div class="counters-container">
                        <div class="counters-grid" id="journey-boxes"></div>
                    </div>
                    <div style="height: 5px;"></div>
                </div>
            
            <!-- Anniversary Panel (Slide 2) -->
            <div class="panel-slide">
                <h2 class="anniversary-header">✨ OUR NEXT ANNIVERSARY ✨</h2>
                <div class="counters-container">
                    <div class="counters-grid" id="countdown-boxes"></div>
                </div>
                <div style="height: 5px;"></div>
            </div>
        </div>
    </div>

    <!-- Glass Button (Fixed at bottom) -->
    <button class="glass-btn" id="nav-btn">
        <span id="nav-text">Our Anniversary</span> <span id="nav-icon">→</span>
    </button>

    <!-- Install Dialog Modal (triggered by double-tap heart) -->
    <div class="modal-overlay" id="install-dialog">
        <div class="modal-content">
            <div class="modal-title" style="font-size: 34px;">✨ Install App ✨</div>
            <p style="margin-bottom: 20px; color: #f0f0f0;">Add this love journey to your home screen:<br><br>
               <strong>📱 iOS</strong>: Tap Share <span style="font-size:18px">↑</span> → "Add to Home Screen"<br>
               <strong>🤖 Android</strong>: Tap Menu ⋮ → "Install App" or "Add to Home Screen"
            </p>
            <button class="modal-btn" id="close-install-btn">Got It 💖</button>
        </div>
    </div>

    <!-- Anniversary Modal (auto show on exact date) -->
    <div class="modal-overlay" id="anni-modal">
        <div class="modal-content">
            <div class="modal-title">Happy Anniversary! ❤️</div>
            <p style="margin-bottom: 20px; color: var(--text-muted);">Another magical year together.</p>
            <button class="modal-btn" id="close-modal-btn">Celebrate 🎉</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const START_DATE = new Date("2020-02-14T10:30:00");
        const START_DISPLAY_STRING = "February 14, 2020";
        
        const sinceSpan = document.getElementById('since-display');
        if(sinceSpan) sinceSpan.innerText = `✨ since ${START_DISPLAY_STRING} ✨`;

        // Unique images only (14) - lazy load via IntersectionObserver
        const uniqueImages = [
            "./assets/img1.png", "./assets/img2.png", "./assets/img3.png", "./assets/img4.png",
            "./assets/img5.png", "./assets/img6.png", "./assets/img7.png", "./assets/img8.png",
            "./assets/img9.png", "./assets/img10.png", "./assets/img11.png", "./assets/img12.png",
            "./assets/img13.png", "./assets/img14.png"
        ];
        const images = [...uniqueImages, ...uniqueImages.slice(0,10)]; // Cycle without excess duplicates

        const journeyLabels = ["Months of Hugs", "Weeks of Joy", "Days of Care", "Hours of Love", "Mins of Laughs", "Secs of Magic"];
        const countLabels = ["Months of Eagerness", "Weeks of Waiting", "Days of Excitement", "Hours of Love", "Mins of Longing", "Secs of Magic"];
        
        const journeyBoxes = document.getElementById('journey-boxes');
        const countdownBoxes = document.getElementById('countdown-boxes');

        function createCounters(container, labels, idPrefix) {
            labels.forEach((label, i) => {
                const box = document.createElement('div');
                box.className = 'counter-box';
                box.innerHTML = `
                    <div class="counter-num" id="${idPrefix}-${i}">0</div>
                    <div class="counter-label">${label}</div>
                `;
                container.appendChild(box);
            });
        }
        createCounters(journeyBoxes, journeyLabels, 'j');
        createCounters(countdownBoxes, countLabels, 'c');

        // --- TIME CALCULATIONS ---
        function calculateDiff(past, future) {
            let diffMs = future - past;
            if(diffMs < 0) diffMs = 0;
            const msInSec = 1000;
            const msInMin = msInSec * 60;
            const msInHour = msInMin * 60;
            const msInDay = msInHour * 24;

            let years = future.getFullYear() - past.getFullYear();
            let months = (years * 12) + (future.getMonth() - past.getMonth());
            if (future.getDate() < past.getDate() || (future.getDate() === past.getDate() && future.getTime() < past.getTime())) {
                months--;
            }
            if (months < 0) months = 0;

            let weeks = Math.floor(diffMs / (msInDay * 7));
            let days = Math.floor(diffMs / msInDay);
            let hours = Math.floor(diffMs / msInHour);
            let mins = Math.floor(diffMs / msInMin);
            let secs = Math.floor(diffMs / msInSec);

            return [months, weeks, days, hours, mins, secs];
        }

        function getNextAnniversary(start) {
            const now = new Date();
            let next = new Date(start);
            next.setFullYear(now.getFullYear());
            if (now > next) {
                next.setFullYear(now.getFullYear() + 1);
            }
            return next;
        }

        let cachedJDiff = [0,0,0,0,0,0];
        let cachedCDiff = [0,0,0,0,0,0];
        let lastCompute = 0;
        const COMPUTE_INTERVAL = 1000; // Compute diffs per second max

        let lastUpdate = 0;
        const TARGET_FPS = 30;
        const FRAME_TIME = 1000 / TARGET_FPS;

        function updateUI(timestamp = 0) {
            if (timestamp - lastUpdate < FRAME_TIME) {
                requestAnimationFrame(updateUI);
                return;
            }
            lastUpdate = timestamp;

            // Throttle heavy compute
            if (timestamp - lastCompute > COMPUTE_INTERVAL) {
                const now = new Date();
                cachedJDiff = calculateDiff(START_DATE, now);
                
                const yearsPassed = Math.floor(cachedJDiff[0] / 12);
                const yearsSpan = document.getElementById('years-text');
                if(yearsSpan) yearsSpan.textContent = `${yearsPassed} Years Of Journey`;

                const nextAnni = getNextAnniversary(START_DATE);
                cachedCDiff = calculateDiff(now, nextAnni);
                lastCompute = timestamp;
            }

            cachedJDiff.forEach((val, i) => {
                const el = document.getElementById(`j-${i}`);
                if(el) {
                    let displayVal = val;
                    if(displayVal.toString().length > 6) el.style.fontSize = "18px";
                    else if(displayVal.toString().length > 8) el.style.fontSize = "14px";
                    else el.style.fontSize = "26px";
                    el.innerText = displayVal;
                }
            });

            cachedCDiff.forEach((val, i) => {
                const el = document.getElementById(`c-${i}`);
                if(el) {
                    if(val.toString().length > 6) el.style.fontSize = "18px";
                    else el.style.fontSize = "26px";
                    el.innerText = val;
                }
            });

            requestAnimationFrame(updateUI);
        }
        updateUI();

        // --- 3. 3D CAROUSEL (REDUCED SENSITIVITY & BETTER ASPECT RATIO)---
        const carousel = document.getElementById('carousel');
        const cellCount = images.length;
        const theta = 360 / cellCount;
        let radius = 0;
        
        // Lazy load images + async decoding
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.decoding = 'async';
                    img.loading = 'lazy';
                    img.setAttribute('draggable', 'false');
                    img.alt = "memory";
                    observer.unobserve(img);
                }
            });
        }, { root: document.querySelector('.scene'), threshold: 0.1 });

        images.forEach((src, index) => {
            const cell = document.createElement('div');
            cell.className = 'carousel__cell';
            const img = document.createElement('img');
            img.dataset.src = src; // Lazy src
            img.classList.add('lazy-img');
            cell.appendChild(img);
            carousel.appendChild(cell);
            observer.observe(img);
        });
        const cells = document.querySelectorAll('.carousel__cell');

        function setupCarousel() {
            if(!cells.length) return;
            const cellWidth = cells[0].offsetWidth;
            radius = Math.round( (cellWidth / 2) / Math.tan(Math.PI / cellCount) );
            cells.forEach((cell, i) => {
                const cellAngle = theta * i;
                cell.style.transform = `rotateY(${cellAngle}deg) translateZ(${radius}px)`;
            });
            rotateCarousel(currentRotation);
        }
        
        let currentRotation = 0;
        function rotateCarousel(deg) {
            carousel.style.transform = `translateZ(-${radius}px) rotateY(${deg}deg)`;
        }

        window.addEventListener('resize', () => setTimeout(setupCarousel, 80));
        setTimeout(setupCarousel, 150);

        let isDragging = false;
        let startX = 0;
        let lastX = 0;
        let velocityX = 0;
        let isAutoSpinning = true;
        let autoSpinAngle = 0;
        let dragSensitivity = 0.65; // REDUCED SENSITIVITY - slower response

        const sceneEl = document.querySelector('.scene');
        sceneEl.addEventListener('pointerdown', (e) => {
            isDragging = true;
            isAutoSpinning = false;
            startX = e.clientX;
            lastX = e.clientX;
            velocityX = 0;
            carousel.style.transition = 'none';
        });

        let dragStartTime = 0;
        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const deltaX = (e.clientX - lastX) * dragSensitivity;
            velocityX = deltaX;
            currentRotation += deltaX;
            rotateCarousel(currentRotation);
            lastX = e.clientX;
            dragStartTime = performance.now();
        });

        window.addEventListener('pointerup', () => {
            if (!isDragging) return;
            isDragging = false;
            const inertia = () => {
                if(Math.abs(velocityX) > 0.08) {
                    currentRotation += velocityX;
                    rotateCarousel(currentRotation);
                    velocityX *= 0.94;
                    requestAnimationFrame(inertia);
                } else {
                    const nearest = Math.round(currentRotation / theta);
                    currentRotation = nearest * theta;
                    carousel.style.transition = 'transform 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
                    rotateCarousel(currentRotation);
                    setTimeout(() => { if(!isDragging) { isAutoSpinning = true; autoSpinAngle = currentRotation; } }, 2000);
                }
            };
            requestAnimationFrame(inertia);
        });

        let lastSpin = 0;
        const SPIN_FRAME_TIME = 33; // ~30fps

        function autoSpin(timestamp = 0) {
            if (document.visibilityState === 'visible' && isAutoSpinning && 
                (performance.now() - dragStartTime > 2000)) {
                if (timestamp - lastSpin < SPIN_FRAME_TIME) {
                    requestAnimationFrame(autoSpin);
                    return;
                }
                lastSpin = timestamp;
                autoSpinAngle += 0.15; // Slightly slower
                currentRotation = autoSpinAngle;
                carousel.style.transition = 'none';
                rotateCarousel(currentRotation);
            }
            requestAnimationFrame(autoSpin);
        }
        autoSpin();

        // --- 4. SWIPE PANELS: Horizontal slide transition (left/right swipe effect)---
        const panelsWrapper = document.getElementById('panelsWrapper');
        const navBtnSlide = document.getElementById('nav-btn');
        const navTextSlide = document.getElementById('nav-text');
        const navIconSlide = document.getElementById('nav-icon');
        
        let showingAnniversarySlide = false;
        
        function switchToAnniversary(showAnni) {
            if(showAnni) {
                panelsWrapper.classList.add('anniversary-active');
                navTextSlide.innerText = "Back";
                navIconSlide.innerText = "←";
                showingAnniversarySlide = true;
            } else {
                panelsWrapper.classList.remove('anniversary-active');
                navTextSlide.innerText = "Our Anniversary";
                navIconSlide.innerText = "→";
                showingAnniversarySlide = false;
            }
        }
        
        navBtnSlide.addEventListener('click', () => {
            if(showingAnniversarySlide) {
                switchToAnniversary(false);
            } else {
                switchToAnniversary(true);
            }
        });

        // Optional: Add touch swipe support for panels container (gesture)
        const panelsContainer = document.querySelector('.panels-container');
        let touchStartXPan = 0;
        let touchEndXPan = 0;
        let isSwiping = false;
        
        panelsContainer.addEventListener('touchstart', (e) => {
            touchStartXPan = e.touches[0].clientX;
            isSwiping = true;
        });
        
        panelsContainer.addEventListener('touchmove', (e) => {
            if(!isSwiping) return;
            // Prevent vertical scrolling interference during horizontal swipe
            const diffX = e.touches[0].clientX - touchStartXPan;
            if(Math.abs(diffX) > 15) {
                e.preventDefault();
            }
        });
        
        panelsContainer.addEventListener('touchend', (e) => {
            if(!isSwiping) return;
            touchEndXPan = e.changedTouches[0].clientX;
            const swipeDistance = touchEndXPan - touchStartXPan;
            const threshold = 60;
            if(Math.abs(swipeDistance) > threshold) {
                if(swipeDistance > 0 && showingAnniversarySlide) {
                    // Swipe right -> go back to journey
                    switchToAnniversary(false);
                } else if(swipeDistance < 0 && !showingAnniversarySlide) {
                    // Swipe left -> go to anniversary
                    switchToAnniversary(true);
                }
            }
            isSwiping = false;
        });
        
        panelsContainer.addEventListener('touchcancel', () => { isSwiping = false; });

        // --- 5. BACKGROUND: LOVE ICONS & PARTICLES (Pure love ambience)---
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let width, height, loveElements = [];

        function resizeBg() {
            width = bgCanvas.width = window.innerWidth;
            height = bgCanvas.height = window.innerHeight;
            loveElements = [];
            const iconsCount = Math.floor(width / 35) + 18;
            for(let i=0; i<Math.min(iconsCount, 25); i++) { // Cap hearts
                loveElements.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 22 + 12,
                    type: Math.random() > 0.6 ? '❤️' : (Math.random() > 0.5 ? '💖' : '🌸'),
                    speedX: (Math.random() - 0.5) * 0.2,
                    speedY: (Math.random() - 0.5) * 0.15 + 0.08,
                    alpha: Math.random() * 0.5 + 0.25,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.015
                });
            }
            for(let i=0;i<25;i++) { // Reduced sparkles 80→25
                loveElements.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 6 + 2,
                    type: '✨',
                    speedX: (Math.random() - 0.5) * 0.08,
                    speedY: (Math.random() - 0.5) * 0.06,
                    alpha: Math.random() * 0.6 + 0.2,
                    rotation: 0,
                    rotSpeed: 0
                });
            }
        }
        window.addEventListener('resize', resizeBg);
        resizeBg();

        let lastBg = 0;
        const BG_FRAME_TIME = 33; // 30fps

        function drawLoveBg(timestamp = 0) {
            if (document.visibilityState !== 'visible') {
                requestAnimationFrame(drawLoveBg);
                return;
            }
            if (timestamp - lastBg < BG_FRAME_TIME) {
                requestAnimationFrame(drawLoveBg);
                return;
            }
            lastBg = timestamp;

            bgCtx.clearRect(0, 0, width, height);
            loveElements.forEach(el => {
                el.x += el.speedX;
                el.y += el.speedY;
                if(el.x < -40) el.x = width + 30;
                if(el.x > width + 40) el.x = -30;
                if(el.y < -40) el.y = height + 30;
                if(el.y > height + 40) el.y = -30;
                
                bgCtx.save();
                bgCtx.translate(el.x, el.y);
                bgCtx.rotate(el.rotation);
                bgCtx.font = `${el.size}px "Segoe UI Emoji", "Apple Color Emoji", sans-serif`;
                bgCtx.globalAlpha = el.alpha * 0.65;
                bgCtx.fillStyle = el.type === '✨' ? '#fff5c4' : '#ff8aae';
                bgCtx.shadowBlur = 8;
                bgCtx.shadowColor = '#ff6b8b';
                bgCtx.fillText(el.type, -el.size/2, el.size/2);
                bgCtx.restore();
                if(el.rotSpeed) el.rotation += el.rotSpeed;
            });
            requestAnimationFrame(drawLoveBg);
        }
        drawLoveBg();

        // --- 6. CONFETTI + ANNIVERSARY MODAL---
        const confCanvas = document.getElementById('confetti-canvas');
        const ctxConf = confCanvas.getContext('2d');
        let confWidth, confHeight;
        let confettiParticles = [];
        
        function resizeConf() {
            confWidth = confCanvas.width = window.innerWidth;
            confHeight = confCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeConf);
        resizeConf();

        function createConfettiBurst() {
            const colors = ['#ff6b8b', '#ffb347', '#ffffff', '#ff9eb5', '#ff85a1'];
            for(let i=0; i<130; i++) {
                confettiParticles.push({
                    x: confWidth/2 + (Math.random() - 0.5) * 200,
                    y: confHeight/2 - 50 + Math.random() * 120,
                    vx: (Math.random() - 0.5) * 14,
                    vy: Math.random() * -12 - 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    size: Math.random() * 9 + 5,
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 14,
                    life: 1.0
                });
            }
        }

        function drawConfetti() {
            ctxConf.clearRect(0, 0, confWidth, confHeight);
            for(let i=confettiParticles.length-1; i>=0; i--) {
                const c = confettiParticles[i];
                c.x += c.vx;
                c.y += c.vy;
                c.vy += 0.38;
                c.rotation += c.rotSpeed;
                c.life -= 0.008;
                ctxConf.save();
                ctxConf.translate(c.x, c.y);
                ctxConf.rotate(c.rotation * Math.PI / 180);
                ctxConf.globalAlpha = Math.max(0, c.life);
                ctxConf.fillStyle = c.color;
                if(i % 2 === 0) {
                    ctxConf.fillRect(-c.size/2, -c.size/2, c.size, c.size);
                } else {
                    ctxConf.beginPath();
                    ctxConf.arc(0, 0, c.size/2, 0, Math.PI*2);
                    ctxConf.fill();
                }
                ctxConf.restore();
                if(c.y > confHeight + 100 || c.life <= 0) confettiParticles.splice(i,1);
            }
            if(confettiParticles.length) requestAnimationFrame(drawConfetti);
        }

        function triggerConfetti() {
            createConfettiBurst();
            drawConfetti();
            setTimeout(() => { createConfettiBurst(); drawConfetti(); }, 280);
            setTimeout(() => { createConfettiBurst(); drawConfetti(); }, 650);
        }

        const today = new Date();
        const anniModal = document.getElementById('anni-modal');
        if (today.getMonth() === START_DATE.getMonth() && today.getDate() === START_DATE.getDate()) {
            anniModal.classList.add('show');
        }
        document.getElementById('close-modal-btn').addEventListener('click', () => {
            anniModal.classList.remove('show');
            triggerConfetti();
        });

        // --- 7. DOUBLE TAP HEART FOR INSTALL DIALOG---
        const heartIcon = document.getElementById('doubleTapHeart');
        let lastTap = 0;
        heartIcon.addEventListener('click', (e) => {
            const nowTime = new Date().getTime();
            const tapInterval = nowTime - lastTap;
            if(tapInterval < 300 && tapInterval > 0) {
                e.preventDefault();
                const installDialogModal = document.getElementById('install-dialog');
                installDialogModal.classList.add('show');
            }
            lastTap = nowTime;
        });
        
        document.getElementById('close-install-btn').addEventListener('click', () => {
            document.getElementById('install-dialog').classList.remove('show');
        });

        // PWA manifest
        const manifestPWA = {
            "name": "Our Love Journey",
            "short_name": "LoveJourney",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#1a1a2e",
            "theme_color": "#ff6b8b",
            "icons": [{
                "src": "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>",
                "sizes": "192x192",
                "type": "image/svg+xml"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifestPWA)], {type: 'application/json'});
        const manifestUrl = URL.createObjectURL(manifestBlob);
        const linkMan = document.createElement('link');
        linkMan.rel = 'manifest';
        linkMan.href = manifestUrl;
        document.head.appendChild(linkMan);
    </script>
</body>
</html>
